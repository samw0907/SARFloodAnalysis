name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install flake8
        run: pip install flake8
      - name: Lint emilia_romagna
        run: flake8 emilia_romagna/src/ emilia_romagna/scripts/
      - name: Lint wroclaw
        run: flake8 wroclaw/src/ wroclaw/scripts/
      - name: Lint jacobabad
        run: flake8 jacobabad/src/ jacobabad/scripts/

  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        case_study: [emilia_romagna, wroclaw, jacobabad]
    name: unit-tests / ${{ matrix.case_study }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt pytest
      - name: Install case-study package
        working-directory: ${{ matrix.case_study }}
        run: pip install -e . --no-deps
      - name: Run unit tests
        working-directory: ${{ matrix.case_study }}
        run: pytest tests/unit/ -v

  docker-smoke:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: emilia-romagna
          - service: wroclaw
          - service: jacobabad
    name: docker / ${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        run: docker compose build ${{ matrix.service }}
      - name: Smoke test
        run: |
          docker compose run --rm --no-deps ${{ matrix.service }} python -c "
          from src.utils.config import load_config
          from src.pipeline.composite import build_composite, run_composites
          from src.pipeline.change import run_change_detection
          from src.pipeline.validate import run_validation
          cfg = load_config('config/pipeline_config.yaml')
          bbox = cfg['study_area']['processing_bbox']
          assert len(bbox) == 4
          print('bbox:', bbox)
          print('all imports and config OK')
          "
